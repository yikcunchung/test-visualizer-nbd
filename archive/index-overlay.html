<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Volkswagen Visualizer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet"><style>
/* Reset */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #1b2236; }

/* VW Fonts (local fallback to Inter) */
@font-face {
  font-family: 'VW Head';
  src: url('assets/fonts/vwhead-bold.woff2') format('woff2'), local('VW Head Bold'), local('VWHead-Bold');
  font-weight: 700; font-style: normal; font-display: swap;
}
@font-face {
  font-family: 'VW Text';
  src: url('assets/fonts/vwtext-regular.woff2') format('woff2'), local('VW Text Regular'), local('VWText-Regular');
  font-weight: 400; font-style: normal; font-display: swap;
}
@font-face {
  font-family: 'VW Text';
  src: url('assets/fonts/vwtext-bold.woff2') format('woff2'), local('VW Text Bold'), local('VWText-Bold');
  font-weight: 700; font-style: normal; font-display: swap;
}

/* Scrollbar hide */
.scrollbar-hide { -ms-overflow-style: none !important; scrollbar-width: none !important; }
.scrollbar-hide::-webkit-scrollbar { display: none !important; width: 0 !important; height: 0 !important; }

/* App shell */
#app {
  width: 100%; height: 100vh; height: 100dvh;
  display: flex; flex-direction: column;
  overflow: hidden;
}

/* TOP BAR */
#topbar {
  background: white;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 8px 0;
  height: 64px;
  width: 100%;
  flex-shrink: 0;
  position: relative; z-index: 10;
}

.topbar-container {
  display: flex; align-items: center; justify-content: space-between;
  width: 100%;
  padding: 0 calc(100vw / 24);
  box-sizing: border-box;
}
@media (min-width: 2560px) {
  .topbar-container { padding: 0 calc(100vw / 24); }
}

/* Logo column */
.topbar-left {
  display: flex; align-items: center; gap: 20px; flex-shrink: 0;
}
.topbar-logo-col {
  display: flex; align-items: center; gap: 20px;
  min-height: 40px; flex-shrink: 0;
}
.topbar-logo-col svg {
  display: block; width: 32px; height: 32px;
}

/* Tabs column — flex-[1_0_0] */
.topbar-tabs-col {
  display: flex; align-items: center; min-height: 40px;
}
.topbar-tabs {
  display: flex; gap: 20px; align-items: center; flex-shrink: 0;
}
.topbar-tab {
  display: flex; align-items: center; justify-content: center;
  padding: 8px 0; flex-shrink: 0;
  font-family: 'VW Text', 'Inter', -apple-system, sans-serif;
  font-weight: 700; font-style: normal;
  font-size: 16px; line-height: 1.2;
  color: #293043; white-space: nowrap;
  word-break: break-word;
  cursor: pointer;
}
@media (max-width: 959px) {
  .topbar-tab { display: none; }
}

/* Actions column — flex-[1_0_0] items-end */
.topbar-actions-col {
  display: flex; flex-direction: column;
  align-items: flex-end; justify-content: center;
  min-height: 40px; flex-shrink: 0;
}
.topbar-actions {
  display: flex; gap: 16px; align-items: center; flex-shrink: 0;
}
@media (max-width: 959px) {
  .topbar-actions { gap: 12px; }
}
.topbar-dealer {
  display: flex; align-items: center; max-width: 150px; flex-shrink: 0;
}
.topbar-dealer-text {
  font-family: 'VW Text', 'Inter', -apple-system, sans-serif;
  font-weight: 400; font-style: normal;
  font-size: 14px; line-height: 1.2;
  color: #293043; white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis;
  flex: 1 0 0; min-width: 1px;
}
@media (max-width: 959px) {
  .topbar-dealer-text { display: none; }
}
.topbar-cta {
  width: 32px; height: 32px; flex-shrink: 0; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.topbar-cta svg {
  width: 24px; height: 24px; display: block; flex-shrink: 0;
}

/* VISUALIZER */
#visualizer {
  flex: 1 1 0; min-height: 0;
  position: relative; overflow: hidden;
  background: #1b2236;
  animation: visFadeIn 0.3s ease 0s both;
}
@media (max-width: 959px) and (min-height: 560px) {
  #visualizer { flex: 0 0 70dvh; max-height: 70dvh; }
}
#visualizer::after {
  content: '';
  position: absolute; left: 0; right: 0; bottom: 0;
  height: 40%;
  background: linear-gradient(
    to top,
    rgba(0, 0, 0, 0.90)  0%,
    rgba(0, 0, 0, 0.90) 12%,
    rgba(0, 0, 0, 0.80) 28%,
    rgba(0, 0, 0, 0.56) 50%,
    rgba(0, 0, 0, 0.25) 72%,
    rgba(0, 0, 0, 0.08) 88%,
    rgba(0, 0, 0, 0.02) 95%,
    transparent         100%
  );
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  -webkit-mask-image: linear-gradient(to top, black 0%, black 50%, transparent 100%);
  mask-image: linear-gradient(to top, black 0%, black 50%, transparent 100%);
  pointer-events: none;
  z-index: 3;
}
@keyframes visFadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}

/* Car image */
#car-video {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  opacity: 1;
  transition: opacity 0.6s ease;
  pointer-events: none;
  display: none;
}
#car-img {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  user-select: none; -webkit-user-drag: none;
  transform-origin: center center;
  transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94), opacity 0.6s ease;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  will-change: transform, opacity;
  image-rendering: auto;
  opacity: 1;
  isolation: isolate;
}
#visualizer.static-mode #car-video { opacity: 0; }
#visualizer.static-mode #car-img   { opacity: 1; }
#car-img.draggable { cursor: grab; }
#car-img.dragging  { cursor: grabbing; }

/* ZOOM CONTROLLERS */
#zoom-ctrl {
  position: absolute; bottom: 20px; right: calc(100vw / 24);
  display: flex; flex-direction: column; gap: 8px;
  align-items: center; z-index: 5;
}
#dpad {
  display: none; /* hidden below 960px */
}
.zoom-btn {
  width: 32px; height: 32px; flex-shrink: 0;
  border: none; background: none; cursor: pointer; padding: 0;
  display: flex; align-items: center; justify-content: center;
}
.zoom-btn svg { display: block; width: 32px; height: 32px; }
#zoom-out {
  opacity: 1;
  transform: scale(1);
  transition: opacity 0.2s ease, transform 0.2s ease;
}
/* Disabled state — WCAG 2.2 AA: opacity 0.3 + cursor + aria-disabled */
.zoom-btn[aria-disabled="true"] {
  opacity: 0.5 !important;
  cursor: not-allowed;
  pointer-events: none;
}

/* ROTATE PILL */
#rotate-pill {
  position: absolute; left: 50%; top: 50%;
  transform: translate(-50%, -50%);
  background: #1b2236;
  display: flex; gap: 8px; align-items: center;
  padding: 8px 16px; border-radius: 100px;
  white-space: nowrap; z-index: 5;
  pointer-events: auto;
}
#rotate-pill.hidden { display: none; }
.rot-btn {
  cursor: pointer; border: none; background: none; padding: 0;
  display: flex; align-items: center; justify-content: center;
  transition: opacity 0.15s;
}
.rot-btn:hover { opacity: 0.7; }
.rot-btn .chevron-lg {
  position: relative; width: 24px; height: 24px; flex-shrink: 0;
}
.rot-btn .chevron-lg svg {
  position: absolute; display: block;
}
/* ChevronLeftIcon */
#rot-left .chevron-lg svg {
  top: 50%; transform: translateY(-50%); left: 20.99%; right: 35.25%; width: auto; height: 21px;
}
/* ChevronRightIcon: top-1/2 -translate-y-1/2 h-[21px] left-[35.41%] right-[20.84%] */
#rot-right .chevron-lg svg {
  top: 50%; transform: translateY(-50%); left: 35.41%; right: 20.84%;
  width: auto; height: 21px;
}
.rotate-label {
  font-family: 'VW Text', 'Inter', -apple-system, sans-serif;
  font-weight: 400; font-style: normal;
  font-size: 16px; line-height: 1.5;
  color: white; text-align: center;
}

/* VW drag-btn-anim: chevrons nudge outward and back */
@keyframes drag-btn-anim-left {
  0%   { transform: translateX(0);    opacity: 1; }
  30%  { transform: translateX(-10px); opacity: 1; }
  80%  { transform: translateX(-10px); opacity: 0; }
  100% { transform: translateX(-10px); opacity: 0; }
}
@keyframes drag-btn-anim-right {
  0%   { transform: translateX(0);  opacity: 1; }
  30%  { transform: translateX(10px); opacity: 1; }
  80%  { transform: translateX(10px); opacity: 0; }
  100% { transform: translateX(10px); opacity: 0; }
}
#rot-left  .chevron-lg { animation: drag-btn-anim-left  1.3s ease-in-out 0s infinite; }
#rot-right .chevron-lg { animation: drag-btn-anim-right 1.3s ease-in-out 0s infinite; }
#rotate-pill.hidden #rot-left  .chevron-lg,
#rotate-pill.hidden #rot-right .chevron-lg { animation: none; }

/* CONFIG PANEL — V2 LAYOUT */

/* Model selection panel — bottom-left */
#model-panel {
  position: absolute;
  bottom: 24px; left: calc(100vw / 24);
  background: transparent; border-radius: 12px; padding: 0;
  display: flex; align-items: flex-start; gap: 8px; z-index: 4;
}
.select-wrap  { height: 55px; transition: width 0.3s; position: relative; }
#model-panel .select-wrap { width: 260px; flex-shrink: 0; }

/* Native <select> styled to match dark design */
.select-native {
  appearance: none; -webkit-appearance: none;
  width: 100%; height: 100%;
  padding: 28px 40px 8px 16px;
  background: transparent;
  border: 1px solid #d0d1d5; border-radius: 8px;
  color: white;
  font-family: 'VW Text', 'Inter', -apple-system, sans-serif;
  font-size: 16px; line-height: 1.2; font-weight: 400;
  cursor: pointer;
  outline: none;
}
.select-label {
  position: absolute; left: 16px; top: 8px;
  font-family: 'VW Text', 'Inter', -apple-system, sans-serif;
  font-size: 12px; line-height: 1.5;
  color: white;
  pointer-events: none; z-index: 1;
}
.select-native:focus {
  border-color: #fff;
  outline: none;
}
.select-native option {
  background: #1b2236;
  color: white;
  font-size: 16px;
}
/* Custom chevron overlay */
.select-chevron-icon {
  position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
  width: 24px; height: 24px; pointer-events: none;
  display: flex; align-items: center; justify-content: center;
}
.select-chevron-icon svg {
  display: block; width: 22px; height: auto;
}

/* Info / Fullscreen icons */
.info-btn {
  cursor: pointer; border: none; background: none;
  transition: opacity 0.15s; flex-shrink: 0;
  width: 24px; height: 24px; position: relative; padding: 0;
}
.info-btn:hover { opacity: 0.7; }
.info-btn svg { position: absolute; display: block; inset: 0; width: 100%; height: 100%; }
.fullscreen-btn {
  cursor: pointer; border: none; background: none;
  transition: opacity 0.15s; flex-shrink: 0;
  width: 24px; height: 24px; position: relative; margin-left: 8px;
}
.fullscreen-btn:hover { opacity: 0.7; }
.fullscreen-btn svg { position: absolute; display: block; inset: 4.17% 4.17% 4.15% 4.17%; width: auto; height: auto; }

/* Options area — centred above switcher */
#variant-selector {
  position: absolute; bottom: 77px; left: 50%; transform: translateX(-50%);
  display: flex; flex-direction: column; align-items: center; gap: 0;
  z-index: 4; max-width: 742px; width: calc(100% - 32px);
  overflow: visible;
}

/* Color name pill */
/* #color-name-wrapper removed — #variant-area is direct child of #variant-selector */

/* Content switcher pill */
#content-switcher {
  position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
  display: flex; align-items: flex-start; flex-shrink: 0;
  z-index: 5;
}

/* Thumbnail scroller (shared) */
#variant-area {
  display: flex; flex-direction: column; gap: 8px; width: 100%;
  overflow: visible; align-items: center;
  will-change: opacity;
}
#variant-track { position: relative; overflow: visible; }
#variant-track.narrow { width: 100%; }
#variant-track.medium { min-width: 320px; max-width: calc(100% - 640px); width: 100%; }
#variant-track.wide   { width: 100%; }
#variant-scroll {
  display: flex; gap: 8px; align-items: center;
  overflow-x: auto; overflow-y: visible;
  padding: 4px 0 2px;
  -webkit-overflow-scrolling: touch;
  scroll-behavior: smooth;
}
#variant-selector #variant-scroll { justify-content: center; }

.variant-fade { position: absolute; top: 0; bottom: 0; width: 46px; pointer-events: none; z-index: 30; display: none; }
.variant-fade.show  { display: block; }
.variant-fade.left  { left: 0;  background: none; }
.variant-fade.right { right: 0; background: none; }
.variant-arrow {
  position: absolute; top: 50%; transform: translateY(-50%);
  background: #fff; display: flex; align-items: center; justify-content: center;
  border-radius: 100px; width: 32px; height: 32px; cursor: pointer; pointer-events: auto; border: none;
  touch-action: manipulation; -webkit-tap-highlight-color: transparent;
}
.variant-fade.left  .variant-arrow { left: 4.04px; }
.variant-fade.right .variant-arrow { right: 9.51px; }
.variant-arrow svg { display: block; width: 6px; height: 12px; }

.variant-btn { position: relative; width: 46px; height: 46px; flex-shrink: 0; cursor: pointer; overflow: visible; border: none; background: none; padding: 0; }
.variant-ring { position: absolute; border-radius: 100%; border: 3px solid #997f67; inset: -4.35%; z-index: 10; pointer-events: none; display: none; }
.variant-btn.selected .variant-ring { display: block; }
.variant-img-wrap  { position: absolute; inset: 0; border-radius: 100%; }
.variant-img-inner { position: absolute; inset: 0; border-radius: 100%; overflow: hidden; }
#wheel-variant-scroll .variant-img-inner,
#wheel-variant-scroll-mobile .variant-img-inner { background: #fff; }
.variant-img       { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
.variant-border    { position: absolute; inset: 0; border-radius: 100%; border: 2px solid white; pointer-events: none; }
.variant-check { position: absolute; z-index: 20; pointer-events: none; top: -13.04%; right: -17.39%; bottom: 60.87%; left: 65.22%; display: none; }
.variant-btn.selected .variant-check { display: block; }
.variant-check-inner { position: absolute; inset: 8.33%; }
.variant-check-inner svg { position: absolute; display: block; inset: 0; width: 100%; height: 100%; }
.variant-checkmark   { position: absolute; inset: 34.71% 26.82% 35.13% 30.54%; }
.variant-checkmark svg { position: absolute; display: block; inset: 0; width: 100%; height: 100%; }

#color-name {
  font-family: 'VW Text', 'Inter', -apple-system, sans-serif;
  font-weight: 400; font-style: normal; font-size: 14px; line-height: 1.2;
  color: white; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* TAB BAR */
#content-switcher-mobile { display: flex; align-items: flex-start; flex-shrink: 0; }
.config-tab {
  position: relative; min-width: 80px; width: 100px; height: 32.797px;
  display: flex; align-items: center; justify-content: center;
  padding: 8px 16px; cursor: pointer; border: none; background: none; transition: opacity 0.15s;
}
.config-tab:hover { opacity: 0.9; }
.config-tab:first-child { border-radius: 4px 0 0 4px; }
.config-tab:last-child  { border-radius: 0 4px 4px 0; }
.config-tab.active { background: #d9cdbd; }
.tab-border {
  position: absolute; inset: 0; pointer-events: none;
  border-top: 1px solid rgba(255,255,255,0.6); border-bottom: 1px solid rgba(255,255,255,0.6);
}
.config-tab:first-child .tab-border { border-left:  1px solid #d9cdbd; border-radius: 4px 0 0 4px; }
.config-tab:last-child  .tab-border { border-right: 1px solid #d9cdbd; border-radius: 0 4px 4px 0; }
.config-tab.active .tab-border { display: none; }
.tab-divider {
  position: absolute; left: 0; top: 50%; transform: translateY(-50%);
  width: 1px; height: 16px; background: #e7e8ea; pointer-events: none; display: none;
}
.tab-divider.show { display: block; }
.tab-label {
  font-family: 'VW Text', 'Inter', -apple-system, sans-serif;
  font-style: normal; font-size: 14px; line-height: 1.2;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; position: relative; z-index: 1;
}
.config-tab.active     .tab-label { color: #1b2236; font-weight: 700; }
.config-tab:not(.active) .tab-label { color: #ffffff; font-weight: 400; }

/* MOBILE PANEL (<960px) */
#config-panel {
  display: none; position: absolute; bottom: 0; left: 0; right: 0;
  flex-direction: column; border-radius: 20px 20px 0 0;
  padding: 20px 20px calc(20px + env(safe-area-inset-bottom)) 20px; gap: 20px;
  background: transparent; z-index: 4;
}
#config-panel.narrow { display: flex; align-items: flex-start; padding-bottom: env(safe-area-inset-bottom, 0px); }
#config-panel.wide   { display: none; }

#mobile-top-row { display: none; align-items: center; justify-content: space-between; width: 100%; }
#mobile-top-row.show { display: flex; }
.mobile-top-left { display: flex; gap: 8px; align-items: center; min-width: 0; }
#mobile-select-wrap { min-width: 160px; width: fit-content; max-width: calc(100vw - 120px); }

#config-content { display: flex; flex-direction: column; gap: 20px; width: 100%; }
#config-panel.narrow #config-content { align-items: flex-start; }
#config-panel.wide   #config-content { align-items: center; }

/* Thumbnail area — mobile (exact v1 #variant-area / #variant-track / #variant-scroll) */
#variant-area-mobile {
  display: flex; flex-direction: column; gap: 8px; width: 100%; overflow: visible;
}
#config-panel.wide   #variant-area-mobile { align-items: center; padding: 0 20px; }
#config-panel.narrow #variant-area-mobile { align-items: flex-start; }

#variant-track-mobile {
  position: relative; overflow: visible;
}
#variant-track-mobile.medium { min-width: 320px; max-width: calc(100% - 640px); width: 100%; }
#variant-track-mobile.wide   { width: 100%; }
#variant-track-mobile.narrow { width: calc(100% + 20px); }

#variant-scroll-mobile {
  display: flex; gap: 8px; align-items: center;
  overflow-x: auto; overflow-y: visible;
  padding: 10px 4px 8px 4px;
  -webkit-overflow-scrolling: touch;
  scroll-behavior: smooth;
}
#config-panel.wide   #variant-scroll-mobile { justify-content: center; }
#config-panel.narrow #variant-scroll-mobile         { justify-content: flex-start; }
#config-panel.narrow #wheel-variant-scroll-mobile    { justify-content: flex-start; }
#config-panel.narrow #interior-variant-scroll-mobile { justify-content: flex-start; }

#color-name-mobile {
  font-family: 'VW Text', 'Inter', -apple-system, sans-serif;
  font-weight: 400; font-style: normal; font-size: 14px; line-height: 1.2;
  color: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
#config-panel.narrow #color-name-mobile { text-align: left; }



/* D-pad nav controls */
/* #dpad shown via @media above 960px */
.dpad-row {
  display: flex; align-items: center; gap: 4px;
}
.dpad-btn {
  width: 32px; height: 32px;
  border: none; background: none; cursor: pointer; padding: 0;
  display: flex; align-items: center; justify-content: center;
}
.dpad-btn[aria-disabled="true"] {
  opacity: 0.5 !important;
  cursor: not-allowed;
  pointer-events: none;
}
.dpad-btn svg { display: block; width: 32px; height: 32px; }
.dpad-spacer { width: 32px; height: 32px; } /* centre placeholder */
/* ENTRY ANIMATIONS — above 960px only */
@keyframes slideUpFade {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes slideUpFadeCenter {
  from { opacity: 0; transform: translateX(-50%) translateY(16px); }
  to   { opacity: 1; transform: translateX(-50%) translateY(0); }
}
@keyframes slideRightFade {
  from { opacity: 0; transform: translateX(12px); }
  to   { opacity: 1; transform: translateX(0); }
}
@keyframes scaleFade {
  from { opacity: 0; transform: translate(-50%, -50%) scale(0.92); }
  to   { opacity: 1; transform: translate(-50%, -50%) scale(1); }
}

/* options-area: fixed bottom, no float */
@media (min-width: 960px) {
  #model-panel {
    animation: slideUpFade 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94) 0.3s both;
  }
  #content-switcher {
    animation: slideUpFadeCenter 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94) 0.15s both;
  }
  #variant-selector {
    animation: slideUpFadeCenter 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94) 0.15s both;
    animation-play-state: paused;
  }
  #variant-selector.ready {
    animation-play-state: running;
  }
  /* #variant-area and #color-name-wrapper ride with #variant-selector */
  #zoom-ctrl {
    animation: slideUpFade 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94) 0.3s both;
  }
  #dpad {
    animation: slideUpFade 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94) 0.3s both;
  }
  #rotate-pill {
    animation: scaleFade 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94) 0.3s both;
  }
}


@media (min-width: 960px) {
  #dpad {
    display: flex;
    position: absolute; bottom: 24px; right: calc(3 * 100vw / 24);
    flex-direction: column; align-items: center; gap: 4px;
    z-index: 5;
  }
}
/* Mobile: asset takes 75% of viewport height, remainder is dark background */
@media (max-width: 959px) {
  #visualizer::after { height: 60%; }
  #car-img, #car-video {
    bottom: auto;
    height: 75dvh;
    -webkit-mask-image: linear-gradient(to bottom, black 55%, transparent 100%);
    mask-image: linear-gradient(to bottom, black 55%, transparent 100%);
  }
  #rotate-pill {
    top: 30%;
  }
}
/* Short mobile screens: constrain asset so UI panels have room */
@media (max-width: 959px) and (max-height: 1280px) {
  #car-img, #car-video { height: 50dvh; }
}
#visualizer.interior-mode #rotate-pill  { display: none; }
#visualizer.interior-mode               { background: #000; }
/* Interior 360° panorama canvas */
#pano-canvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  display: none;
  cursor: grab;
  touch-action: none;
  z-index: 2;
}
#visualizer.interior-mode #pano-canvas  { display: block; }
#visualizer.interior-mode #car-img,
#visualizer.interior-mode #car-video    { opacity: 0; pointer-events: none; }
#pano-canvas.dragging { cursor: grabbing; }
/* Wheel variant scroll areas */
#wheel-variant-scroll         { display: none; flex-direction: row; gap: 8px; justify-content: center; align-items: center; padding: 4px 0 2px; }
#wheel-variant-scroll-mobile  { display: none; flex-direction: row; gap: 8px; justify-content: center; align-items: center; padding: 10px 4px 8px 4px; }
.wheels-active #variant-scroll         { display: none !important; }
.wheels-active #variant-scroll-mobile  { display: none !important; }
.wheels-active #wheel-variant-scroll        { display: flex !important; }
.wheels-active #wheel-variant-scroll-mobile { display: flex !important; }
/* Interior variant scroll areas */
#interior-variant-scroll         { display: none; flex-direction: row; gap: 8px; justify-content: center; align-items: center; padding: 4px 0 2px; }
#interior-variant-scroll-mobile  { display: none; flex-direction: row; gap: 8px; justify-content: center; align-items: center; padding: 10px 4px 8px 4px; }
.interior-active #variant-scroll         { display: none !important; }
.interior-active #variant-scroll-mobile  { display: none !important; }
.interior-active #wheel-variant-scroll        { display: none !important; }
.interior-active #wheel-variant-scroll-mobile { display: none !important; }
.interior-active #interior-variant-scroll        { display: flex !important; }
.interior-active #interior-variant-scroll-mobile { display: flex !important; }
.interior-active #color-name        { display: none; }
.interior-active #color-name-mobile { display: none; }

/* Hide v2 overlays at <960px */
@media (max-width: 959px) {
  #variant-scroll-mobile { justify-content: flex-start; }
  #model-panel    { display: none !important; }
  #variant-selector   { display: none !important; }
  #content-switcher { display: none !important; }
  #zoom-ctrl      { display: none !important; }
}

/* ── NBA Bar ── */
#nba-bar {
  height: 76px; flex-shrink: 0;
  background: #fff;
  display: flex; align-items: center;
  border-top: 1px solid rgba(41,48,67,0.12);
}
.nba-inner {
  display: flex; align-items: center; justify-content: flex-end;
  width: 100%; padding: 0 calc(100vw / 24); gap: 32px;
}
.nba-links {
  display: flex; align-items: center; gap: 32px;
}
.nba-link {
  display: flex; align-items: center; gap: 4px;
  font-family: 'VW Text', 'Inter', -apple-system, sans-serif;
  font-size: 16px; font-weight: 400; color: #293043;
  text-decoration: none; white-space: nowrap; cursor: pointer;
}
.nba-link svg { flex-shrink: 0; }
.nba-link-label {
  line-height: 1.2;
  border-bottom: 1px solid #293043;
}
.nba-cta-btn {
  display: flex; align-items: center; gap: 4px;
  background: #293043; color: #fff;
  font-family: 'VW Text', 'Inter', -apple-system, sans-serif;
  font-size: 16px; font-weight: 400; line-height: 1.2;
  border: none; padding: 8px 32px; height: 44px;
  border-radius: 100px; cursor: pointer; white-space: nowrap; flex-shrink: 0;
}
.nba-cta-btn svg { flex-shrink: 0; }
@media (max-width: 959px) {
  #nba-bar { display: none; }
}

/* ── Accessibility Button ── */
#accessibility-btn {
  position: absolute; top: 20px; left: calc(100vw / 24);
  width: 32px; height: 32px; flex-shrink: 0;
  background: #fff; border: none;
  border-radius: 100px;
  cursor: pointer; padding: 0;
  display: none;
  align-items: center; justify-content: center;
  overflow: hidden; z-index: 5;
  transition: background 0.2s, opacity 0.15s;
}
#accessibility-btn:hover { opacity: 0.7; }
#accessibility-btn.active            { background: #293043; }
#accessibility-btn.active svg path   { fill: #fff; }
@media (max-width: 959px) {
  #accessibility-btn { display: flex; }
}

/* ── Touch Controls Bar — mobile a11y mode ── */
#touch-ctrl-bar {
  position: absolute; top: 20px; left: calc(100vw / 24 + 52px);
  display: none; gap: 20px; align-items: center; z-index: 5;
  pointer-events: none;
}
@media (max-width: 959px) { #touch-ctrl-bar { display: flex; } }
#touch-ctrl-bar.visible { pointer-events: auto; }
.tc-group {
  display: flex; gap: 8px; align-items: center;
  opacity: 0; transform: translateX(-8px);
  transition: opacity 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94), transform 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}
#touch-ctrl-bar.visible .tc-group:nth-child(1) { opacity: 1; transform: translateX(0); }
#touch-ctrl-bar.visible .tc-group:nth-child(2) { opacity: 1; transform: translateX(0); transition-delay: 80ms; }
.touch-ctrl-btn {
  width: 32px; height: 32px; flex-shrink: 0;
  border: none; background: none; cursor: pointer; padding: 0;
  display: flex; align-items: center; justify-content: center;
}
.touch-ctrl-btn[aria-disabled="true"] { opacity: 0.5; cursor: not-allowed; pointer-events: none; }

/* ── Mobile NBA Bar ── */
#nba-bar-mobile {
  display: none;
  position: fixed; bottom: 0; left: 0; right: 0;
  background: #fff;
  border-top: 1px solid #c2cacf;
  padding: 17px 16px calc(16px + env(safe-area-inset-bottom));
  z-index: 20;
}
@media (max-width: 959px) {
  #nba-bar-mobile { display: flex; }
  #config-panel { bottom: 20px; }
}
.nba-mobile-inner {
  display: flex; align-items: center; justify-content: space-between;
  width: 100%;
}
.nba-mobile-menu {
  display: flex; align-items: center; gap: 4px;
  background: none; border: none; cursor: pointer; padding: 0;
  flex-shrink: 0;
}
.nba-mobile-menu-label {
  display: flex; flex-direction: column; align-items: flex-start;
}
.nba-mobile-menu-text {
  font-family: 'VW Text', 'Inter', -apple-system, sans-serif;
  font-size: 16px; font-weight: 400; line-height: 1.2;
  color: #293043; white-space: nowrap;
}
.nba-mobile-menu-stroke { height: 1px; background: #293043; width: 100%; }

// ── Responsive layout ──
function applyLayout() {
  const w = window.innerWidth;
  const isNarrow = w < 960;
  // v1 panel: shown at <960 via class; v2 overlays hidden via CSS media query
  const wasInteriorActive = configPanel.classList.contains('interior-active');
  configPanel.className = isNarrow ? 'narrow' : 'wide';
  if (wasInteriorActive) configPanel.classList.add('interior-active');
  mobileRow.className   = isNarrow ? 'show' : '';
  if (mobileSel) mobileSel.style.width = w < 400 ? '100%' : '312px';
  const trackClass = isNarrow ? 'narrow' : 'wide';
  if (variantTrack)    variantTrack.className    = trackClass;
  if (variantTrackMob) variantTrackMob.className = trackClass;
  carImg.className = selectedColor === 0 ? 'draggable' : '';
  requestAnimationFrame(updateArrows);
}

// ── Thumbnail arrows ──
function updateArrows() {
  const w = window.innerWidth;

  // Use the currently visible desktop scroll container
  const el = [variantScroll, wheelScroll, interiorScroll].find(s => s && s.offsetParent !== null) || variantScroll;
  const over = el.scrollWidth > el.clientWidth + 1;
  const left = el.scrollLeft > 1;
  const right = el.scrollLeft < el.scrollWidth - el.clientWidth - 54;
  const showArrows = over && w < 1600;

  // When overflowing, justify-content:center puts first swatch off-screen (negative offset)
  el.style.justifyContent = over ? 'flex-start' : '';
  fadeLeft.classList.toggle('show',  showArrows && left);
  fadeRight.classList.toggle('show', showArrows && right);
  el.style.paddingLeft  = '4px';
  el.style.paddingRight = (showArrows && right) ? '52px' : '16px';
  const lm = showArrows && left, rm = showArrows && right;
  const mask = lm && rm ? 'linear-gradient(90deg,transparent 0,black 46px,black calc(100% - 46px),transparent 100%)'
             : lm       ? 'linear-gradient(90deg,transparent 0,black 46px,black 100%)'
             : rm       ? 'linear-gradient(90deg,black 0%,black calc(100% - 46px),transparent 100%)'
             : 'none';
  el.style.webkitMaskImage = mask;
  el.style.maskImage = mask;

  // Use the currently visible mobile scroll container
  const em = [variantScrollMob, wheelScrollMob, interiorScrollMob].find(s => s && s.offsetParent !== null);
  if (em) {
    const mo = em.scrollWidth > em.clientWidth + 1;
    const ml = em.scrollLeft > 1;
    const mr = em.scrollLeft < em.scrollWidth - em.clientWidth - 54;
    em.style.justifyContent = mo ? 'flex-start' : '';
    if (fadeLeftMob)  fadeLeftMob.classList.toggle('show',  mo && ml);
    if (fadeRightMob) fadeRightMob.classList.toggle('show', mo && mr);
    em.style.paddingLeft  = '4px';
    em.style.paddingRight = (mo && mr) ? '52px' : '16px';
    const mlm = mo && ml, mrm = mo && mr;
    const maskM = mlm && mrm ? 'linear-gradient(90deg,transparent 0,black 46px,black calc(100% - 46px),transparent 100%)'
               : mlm         ? 'linear-gradient(90deg,transparent 0,black 46px,black 100%)'
               : mrm         ? 'linear-gradient(90deg,black 0%,black calc(100% - 46px),transparent 100%)'
               : 'none';
    em.style.webkitMaskImage = maskM;
    em.style.maskImage = maskM;
  } else {
    if (fadeLeftMob)  fadeLeftMob.classList.remove('show');
    if (fadeRightMob) fadeRightMob.classList.remove('show');
  }
}

    b.className = 'variant-btn' + (i === idx ? ' selected' : ''));

  carImg.className = idx === 0 ? 'draggable' : '';

function activeFrames()  { return activeModel === 'idpolo' ? POLO_ROT_FRAMES : ROT_FRAMES; }
function activeThumbs()  { return activeModel === 'idpolo' ? POLO_THUMBS : THUMBS; }
function frameCount()    { return activeFrames().length; }
function getCarImage() {
  if (selectedColor !== 0) {
    const name = activeThumbs()[selectedColor]?.name;
    if (activeModel === 'idpolo' && name === 'Grenadilla Black Metallic')
      return 'assets/media/idpolo/exterior/rotation-black/frame-00.webp';
    if (activeModel === 'id7' && name === 'Scale Silver Metallic')
      return 'assets/media/id7/exterior/rotation/silver/frame-00.webp';
    if (activeModel === 'id7' && name === 'Glacier White Metallic')
      return 'assets/media/id7/exterior/rotation/white/frame-00.webp';
  }
  return activeFrames()[rotFrame];
}

function updateCarImage() {
  const src = getCarImage();
  if (!carImg.src.endsWith(src)) carImg.src = src;
}

// ── Drag to rotate ──
function startDrag(clientX, clientY) {
  isDragging = true;
  startX = clientX;
  startY = clientY;
  if (selectedColor === 0) carImg.className = 'dragging';
}
function moveDrag(clientX, clientY) {
  if (!isDragging) return;
  const delta  = clientX - startX;
  const deltaY = clientY - startY;
  startX = clientX;
  startY = clientY;
  if (visualizer.classList.contains('interior-mode')) {
    const w = pano.canvas.offsetWidth  || 375;
    const h = pano.canvas.offsetHeight || 667;
    const sens = pano.fov / Math.max(w, h);
    pano.pan(-delta * sens, deltaY * sens);
    return;
  }
  const sensitivity = 0.8;
  rotation += delta * sensitivity;
  const norm = ((rotation % 360) + 360) % 360;
  const newFrame = Math.round((norm / 360) * frameCount()) % frameCount();
  if (selectedColor === 0 && newFrame !== rotFrame) {
    rotFrame = newFrame;
    rotatePill.classList.add('hidden'); pillDismissed = true;
    pillDismissed = true;
    visualizer.classList.add('static-mode');
  } else {
    rotFrame = newFrame;
  }
  updateCarImage();
}
function endDrag() {
  if (!isDragging) return;
  isDragging = false;
  pano.canvas.classList.remove('dragging');
  if (selectedColor === 0) carImg.className = 'draggable';
}

visualizer.addEventListener('mousedown',  e => { if (e.target.closest('#variant-selector, #config-panel')) return; startDrag(e.clientX, e.clientY); });
visualizer.addEventListener('touchstart', e => { if (e.target.closest('#variant-selector, #config-panel')) return; startDrag(e.touches[0].clientX, e.touches[0].clientY); }, {passive:true});
window.addEventListener('mousemove',  e => moveDrag(e.clientX, e.clientY));
window.addEventListener('touchmove',  e => moveDrag(e.touches[0].clientX, e.touches[0].clientY), {passive:true});
window.addEventListener('mouseup',   endDrag);
window.addEventListener('touchend',  endDrag);

// ── Rotate pill buttons ──
document.getElementById('rot-left').addEventListener('click', () => {
  if (visualizer.classList.contains('interior-mode')) {
    pano.pan(-pano.STEP, 0); return;
  }
  if (selectedColor !== 0) return;
  rotFrame = ((rotFrame - 1) + frameCount()) % frameCount();
  rotation -= 360/frameCount();
  updateCarImage();
  rotatePill.classList.add('hidden'); pillDismissed = true;
  visualizer.classList.add('static-mode');
});
document.getElementById('rot-right').addEventListener('click', () => {
  if (visualizer.classList.contains('interior-mode')) {
    pano.pan(pano.STEP, 0); return;
  }
  if (selectedColor !== 0) return;
  rotFrame = (rotFrame + 1) % frameCount();
  rotation += 360/frameCount();
  updateCarImage();
  rotatePill.classList.add('hidden'); pillDismissed = true;
  visualizer.classList.add('static-mode');
});

// ── Active scroll-container helpers ──
function activeScrollEl() {
  return [variantScroll, wheelScroll, interiorScroll].find(s => s && s.offsetParent !== null) || variantScroll;
}
function activeScrollElMob() {
  return [variantScrollMob, wheelScrollMob, interiorScrollMob].find(s => s && s.offsetParent !== null) || variantScrollMob;
}

// ── Thumbnail scroll arrows (pointerdown = instant on touch; click catches keyboard) ──
function wireArrow(btn, dir, getEl) {
  let didPointer = false;
  function doScroll() {
    const el = getEl();
    const max = el.scrollWidth - el.clientWidth;
    const target = dir > 0 ? Math.min(max, el.scrollLeft + 200) : Math.max(0, el.scrollLeft - 200);
    el.scrollTo({ left: target, behavior: 'smooth' });
  }
  btn.addEventListener('pointerdown', () => { didPointer = true; doScroll(); });
  btn.addEventListener('click',       () => { if (didPointer) { didPointer = false; return; } doScroll(); });
}
wireArrow(document.getElementById('scroll-left'),  -1, activeScrollEl);
wireArrow(document.getElementById('scroll-right'),  1, activeScrollEl);

// ── Interior panorama (WebGL rectilinear) ──
const pano = (() => {
  const CVS = document.getElementById('pano-canvas');
  const FOV_BASE = 1.7453, FOV_STEP = 1.2, FOV_MAX_CLICKS = 3;
  const LAT_MIN = -0.70, LAT_MAX = 0.70, STEP = 0.1745;
  let lon = -0.327, lat = 0.10, curFov = FOV_BASE, fovClicks = 0;
  let targetFov = FOV_BASE, fovAnimStart = null, fovAnimFrom = FOV_BASE;
  let targetLon = -0.327, targetLat = 0.10, lonAnimFrom = -0.327, latAnimFrom = 0.10, panAnimStart = null;
  let ctx = null;

  const ANIM_MS = 400;
  function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }

  function animateFov() {
    const t = Math.min(1, (performance.now() - fovAnimStart) / ANIM_MS);
    curFov = fovAnimFrom + (targetFov - fovAnimFrom) * easeOutCubic(t);
    draw();
    if (t < 1) requestAnimationFrame(animateFov);
  }
  function setFov(newFov) {
    fovAnimFrom = curFov;
    targetFov = newFov;
    fovAnimStart = performance.now();
    requestAnimationFrame(animateFov);
  }

  function animatePan() {
    const t = Math.min(1, (performance.now() - panAnimStart) / ANIM_MS);
    const e = easeOutCubic(t);
    lon = lonAnimFrom + (targetLon - lonAnimFrom) * e;
    lat = Math.max(LAT_MIN, Math.min(LAT_MAX, latAnimFrom + (targetLat - latAnimFrom) * e));
    draw();
    if (t < 1) requestAnimationFrame(animatePan);
  }
  function setPanTarget(newLon, newLat) {
    lonAnimFrom = lon;
    latAnimFrom = lat;
    targetLon = newLon;
    targetLat = Math.max(LAT_MIN, Math.min(LAT_MAX, newLat));
    panAnimStart = performance.now();
    requestAnimationFrame(animatePan);
  }

  function syncZoomClasses() {
    const viz = document.getElementById('visualizer');
    viz.classList.remove('zoom-1', 'zoom-2', 'zoom-3');
    if (fovClicks > 0 && window.innerWidth >= 960) viz.classList.add(`zoom-${fovClicks}`);
  }
  const img = new Image();
  img.src = 'assets/media/id7/interior/id7-interior-view.webp';

  function draw() {
    if (!ctx || !img.complete || !img.naturalWidth) return;
    const viz = document.getElementById('visualizer');
    const cw = CVS.offsetWidth || viz.offsetWidth || 0;
    const ch = CVS.offsetHeight || viz.offsetHeight || 0;
    if (!cw || !ch) return;
    if (CVS.width !== cw || CVS.height !== ch) { CVS.width = cw; CVS.height = ch; }

    const iw = img.naturalWidth, ih = img.naturalHeight;
    // Horizontal slice: curFov radians of the full 2π
    const sw = iw * (curFov / (2 * Math.PI));
    // Vertical slice: proportional to viewport aspect
    const vfov = curFov * ch / cw;
    const sh = Math.min(ih, ih * (vfov / Math.PI));
    let sx = iw * ((lon + Math.PI) / (2 * Math.PI)) - sw / 2;
    const sy = Math.max(0, Math.min(ih - sh, ih * (0.5 - lat / Math.PI) - sh / 2));

    ctx.clearRect(0, 0, cw, ch);
    if (sx < 0) {
      // Wrap: draw tail from right side of image, then head from left
      const wrapW = -sx, wrapDw = cw * (wrapW / sw);
      ctx.drawImage(img, iw + sx, sy, wrapW, sh, 0,      0, wrapDw,      ch);
      ctx.drawImage(img, 0,       sy, sw - wrapW, sh, wrapDw, 0, cw - wrapDw, ch);
    } else if (sx + sw > iw) {
      // Wrap: draw to end of image, then continue from left
      const normW = iw - sx, normDw = cw * (normW / sw);
      ctx.drawImage(img, sx, sy, normW,      sh, 0,      0, normDw,      ch);
      ctx.drawImage(img, 0,  sy, sw - normW, sh, normDw, 0, cw - normDw, ch);
    } else {
      ctx.drawImage(img, sx, sy, sw, sh, 0, 0, cw, ch);
    }
  }

  return {
    start() {
      if (!ctx) ctx = CVS.getContext('2d');
      if (img.complete && img.naturalWidth > 0) requestAnimationFrame(draw);
      else img.addEventListener('load', () => requestAnimationFrame(draw), { once: true });
    },
    draw,
    pan(dLon, dLat) {
      lon += dLon; targetLon = lon;
      lat = Math.max(LAT_MIN, Math.min(LAT_MAX, lat + dLat)); targetLat = lat;
      draw();
    },
    step(dLon, dLat) {
      setPanTarget(targetLon + dLon, targetLat + dLat);
    },
    zoomIn() {
      if (fovClicks >= FOV_MAX_CLICKS) return;
      fovClicks++;
      setFov(FOV_BASE / Math.pow(FOV_STEP, fovClicks));
      syncZoomClasses();
    },
    zoomOut() {
      if (fovClicks <= 0) return;
      fovClicks--;
      setFov(FOV_BASE / Math.pow(FOV_STEP, fovClicks));
      syncZoomClasses();
    },
    get atMaxZoom() { return fovClicks >= FOV_MAX_CLICKS; },
    get atMinZoom()  { return fovClicks <= 0; },
    get fov()        { return curFov; },
    reset() {
      lon = -0.327; lat = 0.10; curFov = FOV_BASE; fovClicks = 0;
      targetFov = FOV_BASE; targetLon = -0.327; targetLat = 0.10;
      const viz = document.getElementById('visualizer');
      viz.classList.remove('zoom-1', 'zoom-2', 'zoom-3');
    },
    get canvas() { return CVS; },
    STEP
  };
})();

// ── Zoom ──
let zoomScale = 1;
const zoomIn  = document.getElementById('zoom-in');
const zoomOut = document.getElementById('zoom-out');

const MAX_CLICKS = 3;   // 3 zoom-in clicks max
const ZOOM_STEP  = 1.2; // 120% per click
let   zoomClicks = 0;   // current click count (0 = idle, 4 = max)

function applyZoom() {
  carImg.style.transform = `scale(${zoomScale})`;

  const atMax = zoomClicks >= MAX_CLICKS;
  const atMin = zoomClicks <= 0;

  zoomIn.setAttribute('aria-disabled',  atMax ? 'true' : 'false');
  zoomOut.setAttribute('aria-disabled', atMin ? 'true' : 'false');

  // Above 960px: progressive hide at zoom levels 3 and 4
  if (window.innerWidth >= 960) {
    visualizer.classList.remove('zoom-1','zoom-2','zoom-3');
    if (zoomClicks >= 1) visualizer.classList.add(`zoom-${zoomClicks}`);
  }
}

zoomIn.addEventListener('click', () => {
  if (visualizer.classList.contains('interior-mode')) {
    pano.zoomIn();
    zoomIn.setAttribute('aria-disabled',  pano.atMaxZoom ? 'true' : 'false');
    zoomOut.setAttribute('aria-disabled', pano.atMinZoom ? 'true' : 'false');
    return;
  }
  if (zoomClicks >= MAX_CLICKS) return;
  zoomClicks++;
  zoomScale = Math.round(zoomScale * ZOOM_STEP * 100) / 100;
  applyZoom();
});
zoomOut.addEventListener('click', () => {
  if (visualizer.classList.contains('interior-mode')) {
    pano.zoomOut();
    zoomIn.setAttribute('aria-disabled',  pano.atMaxZoom ? 'true' : 'false');
    zoomOut.setAttribute('aria-disabled', pano.atMinZoom ? 'true' : 'false');
    return;
  }
  if (zoomClicks <= 0) return;
  zoomClicks--;
  zoomScale = Math.round((zoomScale / ZOOM_STEP) * 100) / 100;
  if (zoomClicks === 0) zoomScale = 1;
  applyZoom();
});

// Initial state: zoom-out visible but disabled
zoomIn.setAttribute('aria-label',  'Zoom in');
zoomOut.setAttribute('aria-label', 'Zoom out');
applyZoom();
